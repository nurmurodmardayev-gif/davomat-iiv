<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Davomat — Xodim</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:#0d0f12;color:#e8e6e0;min-height:100vh;display:flex;align-items:flex-start;justify-content:center}
:root{
  --bg:#0d0f12;--s1:#141720;--s2:#1c2030;
  --bd:rgba(255,255,255,.08);--bd2:rgba(255,255,255,.14);
  --g:#4ade80;--g2:#22c55e;--r:#f87171;--w:#fbbf24;--b:#60a5fa;
  --mu:#8a8a8a;--mono:'IBM Plex Mono',monospace
}
.wrap{width:100%;max-width:420px;padding:24px 20px;min-height:100vh}
.hdr{text-align:center;padding:20px 0 28px}
.logo{font-family:var(--mono);font-size:11px;color:var(--g);letter-spacing:.1em}
.hdr-title{font-size:22px;font-weight:500;margin-top:6px}
.clock{font-family:var(--mono);font-size:13px;color:var(--mu);margin-top:4px}
.steps{display:flex;align-items:center;justify-content:center;margin-bottom:24px}
.sn{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;border:1.5px solid var(--bd2);color:var(--mu);flex-shrink:0}
.sn.dn{background:rgba(74,222,128,.15);border-color:var(--g);color:var(--g)}
.sn.ac{background:var(--g2);border-color:var(--g2);color:#0d1a0f}
.sl{width:32px;height:1px;background:var(--bd2);margin:0 4px}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:20px;margin-bottom:14px}
.ct{font-size:14px;font-weight:500;margin-bottom:4px}
.cs{font-size:12px;color:var(--mu);margin-bottom:18px}
.tg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.tb{padding:20px 12px;border-radius:10px;border:1.5px solid var(--bd2);background:var(--s1);cursor:pointer;transition:all .15s;text-align:center;-webkit-tap-highlight-color:transparent}
.tb:active{transform:scale(.97)}
.tb.in-sel{border-color:var(--g);background:rgba(74,222,128,.08)}
.tb.out-sel{border-color:var(--w);background:rgba(251,191,36,.08)}
.tb.off{opacity:.35;cursor:not-allowed;pointer-events:none}
.ti{font-size:32px;margin-bottom:8px}
.tl{font-size:14px;font-weight:500}
.tt{font-size:11px;color:var(--mu);margin-top:3px;font-family:var(--mono)}
.pin-wrap{display:flex;gap:9px;justify-content:center;margin:14px 0}
.pin-box{width:54px;height:62px;background:var(--s2);border:1.5px solid var(--bd2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:26px;color:var(--g);transition:border-color .15s}
.pin-box.ac{border-color:var(--g)}
.pin-box.fi{border-color:rgba(74,222,128,.4)}
.pin-box.err{border-color:var(--r);animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.kp{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:230px;margin:0 auto}
.key{background:var(--s2);border:1px solid var(--bd2);border-radius:9px;padding:15px 10px;text-align:center;font-size:20px;cursor:pointer;font-family:var(--mono);transition:background .1s;user-select:none;-webkit-tap-highlight-color:transparent}
.key:active{background:var(--s1);transform:scale(.95)}
.key.dl{font-size:14px;color:var(--r)}
.key.ok{background:rgba(74,222,128,.1);border-color:rgba(74,222,128,.3);color:var(--g)}
.gps{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:8px;font-size:13px;margin-bottom:12px}
.gps.ok{background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);color:var(--g)}
.gps.err{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);color:var(--r)}
.gps.loading{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.2);color:var(--w)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;animation:pulse 1.4s ease-in-out infinite}
.dg{background:var(--g)}.dr{background:var(--r)}.dw{background:var(--w)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.fp-area{text-align:center;margin:16px 0}
.fp-btn{width:120px;height:120px;border-radius:50%;border:2px solid var(--bd2);background:var(--s2);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .25s;margin:0 auto;-webkit-tap-highlight-color:transparent}
.fp-btn:active{transform:scale(.95)}
.fp-btn.sc{border-color:var(--g);animation:scan 1s ease-in-out infinite}
.fp-btn.ok{border-color:var(--g);background:rgba(74,222,128,.15)}
@keyframes scan{0%,100%{box-shadow:0 0 0 6px rgba(74,222,128,.07)}50%{box-shadow:0 0 0 18px rgba(74,222,128,.03)}}
.fp-ic{font-size:48px}
.fp-lb{font-size:11px;color:var(--mu);margin-top:6px}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:12px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:'IBM Plex Sans',sans-serif;margin-top:10px;-webkit-tap-highlight-color:transparent}
.btn:active{transform:scale(.98)}
.bp{background:var(--g2);color:#0d1a0f}.bp:hover,.bp:active{background:var(--g)}
.bo{background:transparent;border:1px solid var(--bd2);color:#e8e6e0}
.btn:disabled{opacity:.4;cursor:not-allowed}
.alert{padding:11px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;line-height:1.5}
.al-e{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);color:var(--r)}
.al-s{background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);color:var(--g)}
.al-w{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.2);color:var(--w)}
.done{text-align:center;padding:20px 0}
.done-ic{font-size:80px;margin-bottom:16px;animation:pop .4s ease-out}
@keyframes pop{0%{transform:scale(.3)}80%{transform:scale(1.1)}100%{transform:scale(1)}}
.done-h{font-size:20px;font-weight:500;color:var(--g);margin-bottom:10px}
.done-n{font-size:16px;color:var(--mu);margin-bottom:8px}
.done-t{font-family:var(--mono);font-size:36px;margin-bottom:4px}
.done-d{font-size:12px;color:var(--mu);margin-bottom:28px}
.mono{font-family:var(--mono)}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading-screen" class="wrap" style="display:flex;align-items:center;justify-content:center;min-height:100vh">
  <div style="text-align:center">
    <div style="font-size:32px;margin-bottom:12px">🔥</div>
    <div style="font-family:var(--mono);font-size:11px;color:var(--g);letter-spacing:.1em">YUKLANMOQDA...</div>
  </div>
</div>

<!-- ERROR -->
<div id="error-screen" style="display:none;width:100%">
  <div class="wrap" style="display:flex;align-items:center;justify-content:center;min-height:100vh">
    <div style="text-align:center">
      <div style="font-size:40px;margin-bottom:12px">⚠️</div>
      <div style="color:var(--r);font-family:var(--mono);font-size:13px;margin-bottom:8px">ULANMADI</div>
      <div id="err-msg" style="color:var(--mu);font-size:12px;line-height:1.7;margin-bottom:16px"></div>
      <button class="btn bp" style="max-width:200px;margin:0 auto" onclick="location.reload()">🔄 Qayta</button>
    </div>
  </div>
</div>

<!-- MAIN -->
<div id="main-screen" style="display:none;width:100%">
  <div class="wrap">
    <div class="hdr">
      <div class="logo">DAVOMAT TIZIMI</div>
      <div class="hdr-title">Xodim kirishi</div>
      <div class="clock" id="clock"></div>
    </div>
    <div id="root"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import {
  getFirestore, doc, getDoc, setDoc, collection, getDocs, serverTimestamp
} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

// ════════════════════════════════════════════════════
//  FIREBASE CONFIG — admin.html bilan bir xil bo'lishi shart
// ════════════════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBj8NERdHAsxTJ7dl-xaIKwDQWFNgCl8bU",
  authDomain: "hodimlar-nazorati.firebaseapp.com",
  projectId: "hodimlar-nazorati",
  storageBucket: "hodimlar-nazorati.firebasestorage.app",
  messagingSenderId: "539426574914",
  appId: "1:539426574914:web:aef7f4787592bcece913db"
};

// ════════════════════════════════════════════════════
//  COLLECTION NOMLARI — admin.html bilan mos
// ════════════════════════════════════════════════════
const COL_STAFF      = 'staff';
const COL_ATTENDANCE = 'attendance';

// ════════════════════════════════════════════════════
//  XAVFSIZLIK: Brute-force himoya (sessionStorage)
// ════════════════════════════════════════════════════
const MAX_ATTEMPTS = 5;
const LOCKOUT_MS   = 5 * 60 * 1000;
const LOCK_KEY     = 'dav_emp_lock_v2';

function checkLockout() {
  try {
    const raw = sessionStorage.getItem(LOCK_KEY);
    if (!raw) return false;
    const lock = JSON.parse(raw);
    if (Date.now() < lock.until) return lock;
    sessionStorage.removeItem(LOCK_KEY);
  } catch(e) { sessionStorage.removeItem(LOCK_KEY); }
  return false;
}

function recordFailedAttempt() {
  let attempts = 0;
  try {
    const raw = sessionStorage.getItem(LOCK_KEY);
    if (raw) { const d = JSON.parse(raw); attempts = d.attempts || 0; }
  } catch(e) {}
  attempts++;
  if (attempts >= MAX_ATTEMPTS) {
    sessionStorage.setItem(LOCK_KEY, JSON.stringify({ until: Date.now() + LOCKOUT_MS, attempts }));
    return { locked: true, until: Date.now() + LOCKOUT_MS };
  }
  sessionStorage.setItem(LOCK_KEY, JSON.stringify({ attempts, until: 0 }));
  return { locked: false, attempts, remaining: MAX_ATTEMPTS - attempts };
}

function clearAttempts() { sessionStorage.removeItem(LOCK_KEY); }

// ════════════════════════════════════════════════════
//  FIREBASE INIT
// ════════════════════════════════════════════════════
let db = null;

async function initFirebase() {
  try {
    const app = initializeApp(FIREBASE_CONFIG, 'davomat-emp-v2');
    db = getFirestore(app);
    await getDoc(doc(db, 'config', 'app'));
    return true;
  } catch(e) {
    console.error('Firebase xatosi:', e);
    db = null;
    return false;
  }
}

// ════════════════════════════════════════════════════
//  FIRESTORE HELPERS
// ════════════════════════════════════════════════════

// Sozlamalar (field nomlar admin.html bilan mos: workStart, workEnd, leaveStart, leaveEnd, lat, lon, radius, gpsEnabled)
async function loadConfig() {
  try {
    const snap = await getDoc(doc(db, 'config', 'app'));
    if (snap.exists()) {
      const d = snap.data();
      return {
        workStart:    d.workStart    || '08:00',
        workEnd:      d.workEnd      || '09:00',
        leaveStart:   d.leaveStart   || '17:00',
        leaveEnd:     d.leaveEnd     || '18:00',
        locationLat:  parseFloat(d.lat)    || 0,
        locationLng:  parseFloat(d.lon)    || 0,
        locationName: d.locationName || 'Ish joyi',
        radius:       parseInt(d.radius)   || 50,
        gpsEnabled:   d.gpsEnabled !== false && !!(d.lat && d.lon),
      };
    }
  } catch(e) {
    console.warn('Config yuklanmadi, default:', e.message);
  }
  return {
    workStart:'08:00', workEnd:'09:00',
    leaveStart:'17:00', leaveEnd:'18:00',
    locationLat:0, locationLng:0,
    locationName:'Ish joyi', radius:50, gpsEnabled:false
  };
}

// Xodimni PIN bo'yicha topish (COL_STAFF collectionidan, field: pin)
async function findStaffByPin(pin) {
  // Kichik brute-force: PIN uzunligi 4 — serverga yuklash avval
  const snap = await getDocs(collection(db, COL_STAFF));
  const staff = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  return staff.find(e => e.pin === pin) || null;
}

// Bugungi yozuvni o'qish
// doc ID: staffId_YYYY-MM-DD
async function loadTodayRecord(staffId, date) {
  const docId = staffId + '_' + date;
  const snap = await getDoc(doc(db, COL_ATTENDANCE, docId));
  if (snap.exists()) return { id: docId, ...snap.data() };
  return null;
}

// Davomat yozish
async function saveAttendance(staffId, staffName, staffPos, date, type, time, lat, lon, kelishStatus, ketishStatus) {
  const docId = staffId + '_' + date;
  const existing = await loadTodayRecord(staffId, date);
  const base = existing || {
    staffId, staffName, staffPos: staffPos || '', date,
    createdAt: serverTimestamp()
  };

  if (type === 'in') {
    base.kelish       = time;
    base.kelishAt     = new Date().toISOString();
    base.kelishStatus = kelishStatus || "O'z vaqtida";
    if (lat != null) { base.kelishLat = lat; base.kelishLon = lon; }
  } else {
    base.ketish       = time;
    base.ketishAt     = new Date().toISOString();
    base.ketishStatus = ketishStatus || "O'z vaqtida ketdi";
    if (lat != null) { base.ketishLat = lat; base.ketishLon = lon; }
  }
  base.updatedAt = serverTimestamp();

  await setDoc(doc(db, COL_ATTENDANCE, docId), base, { merge: true });
}

// ════════════════════════════════════════════════════
//  HOLAT HISOBLASH
// ════════════════════════════════════════════════════
function tMin(t) {
  if (!t) return 0;
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

function curMin() {
  const n = new Date();
  return n.getHours() * 60 + n.getMinutes();
}

function calcKelishStatus(config) {
  return curMin() <= tMin(config.workStart) ? "O'z vaqtida" : 'Kech';
}

function calcKetishStatus(config) {
  return curMin() < tMin(config.leaveStart) ? 'Erta ketdi' : "O'z vaqtida ketdi";
}

// ════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════
let state = {
  step:    'type',   // type | pin | gps | confirm | done
  type:    null,     // 'in' | 'out'
  pin:     '',
  staffId: null, staffName: '', staffPos: '',
  gpsStatus: 'idle', gpsMsg: '',
  gpsLat: null, gpsLon: null,
  fpState: 'idle',
  error: null, result: null,
  loading: false,
  config: null,
  _kelishStatus: "O'z vaqtida",
  _ketishStatus: "O'z vaqtida ketdi",
};

// ════════════════════════════════════════════════════
//  UTILS
// ════════════════════════════════════════════════════
function td() { return new Date().toISOString().split('T')[0]; }
function nowT() {
  const n = new Date();
  return String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
}

function updateClock() {
  const el = document.getElementById('clock');
  if (el) el.textContent = nowT();
  setTimeout(updateClock, 15000);
}

// ════════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════════
async function render() {
  const root = document.getElementById('root');
  if (!root) return;

  // Config har safar yangi olinadi (cache emas, real vaqtda)
  let cfg;
  try { cfg = await loadConfig(); state.config = cfg; }
  catch(e) { root.innerHTML = `<div class="alert al-e">Firebase xatosi: ${e.message}</div>`; return; }

  const cur = curMin();

  const inOk  = !cfg.workStart  || !cfg.workEnd  || (cur >= tMin(cfg.workStart)  && cur <= tMin(cfg.workEnd));
  const outOk = !cfg.leaveStart || !cfg.leaveEnd || (cur >= tMin(cfg.leaveStart) && cur <= tMin(cfg.leaveEnd));

  // Qadamlar
  const stepOrder = cfg.gpsEnabled ? ['type','pin','gps','confirm'] : ['type','pin','confirm'];
  const stepLabels = cfg.gpsEnabled ? ['Tur','Kod','GPS','Tasdiqlash'] : ['Tur','Kod','Tasdiqlash'];

  let steps = '';
  if (state.step !== 'type' && state.step !== 'done') {
    const idx = stepOrder.indexOf(state.step);
    steps = `<div class="steps">${stepLabels.map((n,i) => `
      <div style="display:flex;align-items:center">
        <div class="sn ${i<idx?'dn':i===idx?'ac':''}">${i<idx?'✓':i+1}</div>
        ${i<stepLabels.length-1?'<div class="sl"></div>':''}
      </div>`).join('')}</div>`;
  }

  const errBlock = state.error
    ? `<div class="alert al-e">${state.error} <span onclick="clearErr()" style="float:right;cursor:pointer">✕</span></div>`
    : '';

  let content = '';

  // ── TUR TANLASH ─────────────────────────────────
  if (state.step === 'type') {
    content = `
      <div class="card">
        <div class="ct">Davomat turi</div>
        <div class="cs">Kelayapsizmi yoki ketayapsizmi?</div>
        <div class="tg">
          <div class="tb ${!inOk?'off':''}" onclick="${inOk?'selectType(\'in\')':''}">
            <div class="ti">🏢</div>
            <div class="tl">Kelish</div>
            <div class="tt">${cfg.workStart}–${cfg.workEnd}</div>
          </div>
          <div class="tb ${!outOk?'off':''}" onclick="${outOk?'selectType(\'out\')':''}">
            <div class="ti">🏠</div>
            <div class="tl">Ketish</div>
            <div class="tt">${cfg.leaveStart}–${cfg.leaveEnd}</div>
          </div>
        </div>
        <div style="font-size:11px;color:var(--mu);text-align:center">
          ${cfg.gpsEnabled ? `📍 ${cfg.locationName} · Radius: ${cfg.radius}m` : '📍 GPS tekshiruvsiz rejim'}
        </div>
      </div>
    `;
  }

  // ── PIN KIRISH ──────────────────────────────────
  else if (state.step === 'pin') {
    const lock = checkLockout();
    let lockMsg = '';
    if (lock && lock.locked) {
      const r = Math.ceil((lock.until - Date.now()) / 1000);
      const m = Math.floor(r/60), s = r%60;
      lockMsg = `<div class="alert al-e">🔒 ${MAX_ATTEMPTS} ta noto'g'ri urinish. ${m}:${String(s).padStart(2,'0')} kuting</div>`;
    }
    content = `
      <div class="card">
        <div class="ct">${state.type==='in'?'🏢 Kelish':'🏠 Ketish'} — PIN kiriting</div>
        <div class="cs">Sizga berilgan 4 xonali PIN kodni kiriting</div>
        ${lockMsg}
        <div class="pin-wrap">
          ${Array.from({length:4}).map((_,i) => {
            const d = state.pin[i] || '';
            return `<div class="pin-box ${i===state.pin.length&&!state._pinErr?'ac':''} ${d?'fi':''} ${state._pinErr?'err':''}">${d?'●':''}</div>`;
          }).join('')}
        </div>
        ${!lock?.locked ? `<div class="kp">
          ${['1','2','3','4','5','6','7','8','9','del','0','ok'].map(k=>`
            <div class="key ${k==='del'?'dl':''} ${k==='ok'?'ok':''}" onclick="pinKey('${k}')">${k==='del'?'⌫':k==='ok'?'✓':k}</div>
          `).join('')}
        </div>` : ''}
      </div>
      <button class="btn bo" onclick="goBack()">← Orqaga</button>
    `;
  }

  // ── GPS TEKSHIRUV ───────────────────────────────
  else if (state.step === 'gps') {
    const gClass   = state.gpsStatus==='ok'?'ok':state.gpsStatus==='err'?'err':'loading';
    const dotClass = state.gpsStatus==='ok'?'dg':state.gpsStatus==='err'?'dr':'dw';
    const gMsg     = state.gpsStatus==='loading'
      ? '📡 Joylashuv aniqlanmoqda...'
      : state.gpsStatus==='ok' ? state.gpsMsg : (state.gpsMsg || 'GPS xatosi');
    content = `
      <div class="card">
        <div class="ct">📍 GPS tekshiruvi</div>
        <div class="cs">${state.staffName} — ${state.type==='in'?'Kelish':'Ketish'}</div>
        <div class="gps ${gClass}">
          <div class="dot ${dotClass}"></div>
          <span>${gMsg}</span>
        </div>
        ${state.gpsStatus==='ok'
          ? `<button class="btn bp" onclick="continueGps()">Davom etish →</button>`
          : ''}
        ${state.gpsStatus==='err'
          ? `<div class="alert al-w" style="font-size:12px">Joylashuvga ruxsat berish: Brauzer sozlamalari → Bu sayt → Joylashuv → Ruxsat</div>
             <button class="btn bo" onclick="startGps()">🔄 Qayta urinish</button>`
          : ''}
      </div>
      <button class="btn bo" onclick="goBack()" ${state.gpsStatus==='loading'?'disabled':''}>← Orqaga</button>
    `;
  }

  // ── TASDIQLASH ──────────────────────────────────
  else if (state.step === 'confirm') {
    content = `
      <div class="card">
        <div class="ct">🔐 Tasdiqlash</div>
        <div class="cs">${state.staffName}${state.staffPos?' · '+state.staffPos:''}</div>
        <div style="background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:14px;margin-bottom:14px">
          <div style="font-size:12px;color:var(--mu);margin-bottom:4px">Amal:</div>
          <div style="font-size:16px;font-weight:500">${state.type==='in'?'🏢 Kelish':'🏠 Ketish'}</div>
          <div style="font-family:var(--mono);font-size:24px;margin-top:8px">${nowT()}</div>
          <div style="font-size:12px;color:var(--mu);margin-top:2px">${td()}</div>
          ${state.gpsLat ? `<div style="font-size:11px;color:var(--g);margin-top:6px">📍 GPS tasdiqlangan</div>` : ''}
        </div>
        <div class="fp-area">
          <div class="fp-btn ${state.fpState==='scanning'?'sc':state.fpState==='success'?'ok':''}" onclick="scanFp()">
            <div class="fp-ic">${state.fpState==='success'?'✅':state.fpState==='scanning'?'⏳':'👆'}</div>
            <div class="fp-lb">${state.fpState==='success'?'Tasdiqlandi!':state.fpState==='scanning'?'Saqlanmoqda...':'Bosib tasdiqlang'}</div>
          </div>
        </div>
      </div>
      <button class="btn bo" onclick="goBack()" ${state.fpState==='scanning'?'disabled':''}>← Orqaga</button>
    `;
  }

  // ── NATIJA ──────────────────────────────────────
  else if (state.step === 'done' && state.result) {
    const r = state.result;
    content = `
      <div class="done">
        <div class="done-ic">${r.type==='in'?'✅':'👋'}</div>
        <div class="done-h">${r.type==='in'?'Kelish qayd etildi!':'Ketish qayd etildi!'}</div>
        <div class="done-n">${r.staffName}</div>
        <div class="done-t">${r.time}</div>
        <div class="done-d">${r.date}</div>
        <div style="font-size:12px;color:var(--g);margin-bottom:6px;font-family:var(--mono)">
          ${r.type==='in' ? r.kelishStatus : r.ketishStatus}
        </div>
        <div style="font-size:11px;color:var(--mu);margin-bottom:24px">Firebase ga saqlandi 🔥</div>
        <button class="btn bp" onclick="resetState()">Yangi amal</button>
      </div>
    `;
  }

  root.innerHTML = steps + errBlock + content;
}

// ════════════════════════════════════════════════════
//  ACTIONS
// ════════════════════════════════════════════════════
window.clearErr = function() { state.error = null; render(); };

window.goBack = function() {
  const cfg = state.config;
  const order = cfg?.gpsEnabled ? ['type','pin','gps','confirm'] : ['type','pin','confirm'];
  const idx = order.indexOf(state.step);
  if (idx > 0) { state.step = order[idx-1]; state.error = null; state._pinErr = false; render(); }
};

window.resetState = function() {
  state = {
    step:'type', type:null, pin:'',
    staffId:null, staffName:'', staffPos:'',
    gpsStatus:'idle', gpsMsg:'',
    gpsLat:null, gpsLon:null,
    fpState:'idle', error:null, result:null, loading:false,
    config:null,
    _kelishStatus:"O'z vaqtida",
    _ketishStatus:"O'z vaqtida ketdi",
  };
  render();
};

window.selectType = async function(type) {
  const cfg = await loadConfig();
  state.config = cfg;
  const cur = curMin();

  if (type === 'in') {
    if (cfg.workStart && cfg.workEnd) {
      if (cur < tMin(cfg.workStart) || cur > tMin(cfg.workEnd)) {
        state.error = `Kelish vaqti faqat ${cfg.workStart}–${cfg.workEnd} orasida`;
        render(); return;
      }
    }
  }
  if (type === 'out') {
    if (cfg.leaveStart && cfg.leaveEnd) {
      if (cur < tMin(cfg.leaveStart) || cur > tMin(cfg.leaveEnd)) {
        state.error = `Ketish vaqti faqat ${cfg.leaveStart}–${cfg.leaveEnd} orasida`;
        render(); return;
      }
    }
  }

  state._kelishStatus = calcKelishStatus(cfg);
  state._ketishStatus = calcKetishStatus(cfg);
  state.type = type;
  state.step = 'pin';
  state.error = null;
  state._pinErr = false;
  render();
};

window.pinKey = function(k) {
  const lock = checkLockout();
  if (lock && lock.locked) { render(); return; }

  if (k === 'del') {
    state.pin = state.pin.slice(0, -1);
    state._pinErr = false;
    render(); return;
  }
  if (k === 'ok') {
    if (state.pin.length >= 4) submitPin();
    return;
  }
  if (state.pin.length < 4) {
    state.pin += k;
    state._pinErr = false;
    render();
    if (state.pin.length === 4) setTimeout(submitPin, 150);
  }
};

async function submitPin() {
  if (state.loading) return;

  const lock = checkLockout();
  if (lock && lock.locked) {
    state.pin = '';
    render(); return;
  }

  state.loading = true;

  try {
    const emp = await findStaffByPin(state.pin);

    if (!emp) {
      const result = recordFailedAttempt();
      state._pinErr = true;
      if (result.locked) {
        state.error = `${MAX_ATTEMPTS} ta noto'g'ri urinish. 5 daqiqa bloklandingiz.`;
      } else {
        state.error = `Noto'g'ri PIN. Qolgan urinish: ${result.remaining}`;
      }
      state.pin = '';
      state.loading = false;
      render(); return;
    }

    // Muvaffaqiyatli PIN — urinishlarni tozalash
    clearAttempts();

    const today = td();
    const existing = await loadTodayRecord(emp.id, today);

    // Bir kunlik bir marotaba tekshiruv
    if (state.type === 'in' && existing?.kelish) {
      state.error = `${emp.name} bugun allaqachon keldi (${existing.kelish}).`;
      state.pin = ''; state.loading = false; render(); return;
    }
    if (state.type === 'out' && existing?.ketish) {
      state.error = `${emp.name} bugun allaqachon ketdi (${existing.ketish}).`;
      state.pin = ''; state.loading = false; render(); return;
    }
    if (state.type === 'out' && !existing?.kelish) {
      state.error = '⚠️ Avval kelish qayd etilmagan. Ketish mumkin emas.';
      state.pin = ''; state.loading = false; render(); return;
    }

    state.staffId   = emp.id;
    state.staffName = emp.name;
    state.staffPos  = emp.position || emp.dept || '';
    state.loading   = false;

    const cfg = state.config || await loadConfig();
    if (cfg.gpsEnabled) {
      state.step = 'gps';
      state.error = null;
      render();
      startGps();
    } else {
      state.step = 'confirm';
      state.error = null;
      render();
    }

  } catch(e) {
    state.error = 'Firebase xatosi: ' + e.message;
    state.pin = '';
    state.loading = false;
    render();
  }
}

window.startGps = function() {
  state.gpsStatus = 'loading';
  state.gpsMsg = '';
  render();

  if (!navigator.geolocation) {
    state.gpsStatus = 'err';
    state.gpsMsg = "Qurilmangiz GPS ni qo'llamaydi";
    render(); return;
  }

  navigator.geolocation.getCurrentPosition(
    async pos => {
      const cfg = state.config || await loadConfig();
      const R = 6371000;
      const dLat = (pos.coords.latitude  - cfg.locationLat) * Math.PI / 180;
      const dLon = (pos.coords.longitude - cfg.locationLng) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2
        + Math.cos(cfg.locationLat * Math.PI/180)
        * Math.cos(pos.coords.latitude * Math.PI/180)
        * Math.sin(dLon/2)**2;
      const dist = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

      state.gpsLat = pos.coords.latitude;
      state.gpsLon = pos.coords.longitude;

      if (dist <= cfg.radius) {
        state.gpsStatus = 'ok';
        state.gpsMsg = `✓ Hududda (${Math.round(dist)}m masofada, ruxsat: ${cfg.radius}m)`;
      } else {
        state.gpsStatus = 'err';
        state.gpsMsg = `Hududdan ${Math.round(dist - cfg.radius)}m tashqaridasiz. Ish joyiga yaqinroq keling.`;
        // GPS xato bo'lsa — saqlash mumkin emas
        state.gpsLat = null;
        state.gpsLon = null;
      }
      render();
    },
    err => {
      state.gpsStatus = 'err';
      state.gpsMsg = err.code === 1
        ? "Joylashuvga ruxsat berilmagan. Brauzer sozlamalarida ruxsat bering."
        : err.code === 3
        ? 'GPS signal topilmadi (timeout). Qayta urining.'
        : 'GPS xatosi: ' + err.message;
      render();
    },
    { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 }
  );
};

window.continueGps = function() {
  if (state.gpsStatus !== 'ok') return;
  state.step = 'confirm';
  render();
};

window.scanFp = function() {
  if (state.fpState !== 'idle') return;
  state.fpState = 'scanning';
  render();

  async function tryBiometric() {
    try {
      if (window.PublicKeyCredential) {
        const avail = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
        if (avail) {
          await navigator.credentials.get({
            publicKey: {
              challenge: crypto.getRandomValues(new Uint8Array(32)),
              timeout: 30000,
              userVerification: 'preferred'
            }
          });
        }
      }
    } catch(e) {
      // Biometrik muvaffaqiyatsiz bo'lsa ham davom etamiz
      console.log('Biometrik:', e.name);
    }
    finalizeAttendance();
  }

  setTimeout(tryBiometric, 800);
};

async function finalizeAttendance() {
  const time  = nowT();
  const today = td();
  try {
    await saveAttendance(
      state.staffId, state.staffName, state.staffPos,
      today, state.type, time,
      state.gpsLat, state.gpsLon,
      state._kelishStatus,
      state._ketishStatus
    );
    state.fpState = 'success';
    state.result  = {
      type:         state.type,
      staffName:    state.staffName,
      time, date:   today,
      kelishStatus: state._kelishStatus,
      ketishStatus: state._ketishStatus,
    };
    render();
    setTimeout(() => { state.step = 'done'; render(); }, 700);
  } catch(e) {
    state.fpState = 'idle';
    state.error   = 'Saqlashda xato: ' + e.message;
    render();
  }
}

// ════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════
(async function init() {
  const ok = await initFirebase();

  if (!ok) {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('error-screen').style.display = 'block';
    document.getElementById('err-msg').textContent =
      'Firebase ga ulanib bo\'lmadi. Internet ulanishingizni tekshiring.';
    return;
  }

  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'block';
  updateClock();
  render();
})();
</script>
</body>
