<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Davomat — Xodim</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:#0d0f12;color:#e8e6e0;min-height:100vh;display:flex;align-items:flex-start;justify-content:center}
:root{--bg:#0d0f12;--s1:#141720;--s2:#1c2030;--bd:rgba(255,255,255,.08);--bd2:rgba(255,255,255,.14);--g:#4ade80;--g2:#22c55e;--r:#f87171;--w:#fbbf24;--b:#60a5fa;--mu:#8a8a8a;--mono:'IBM Plex Mono',monospace}
.wrap{width:100%;max-width:420px;padding:24px 20px;min-height:100vh}
.hdr{text-align:center;padding:20px 0 28px}
.logo{font-family:var(--mono);font-size:11px;color:var(--g);letter-spacing:.1em}
.hdr-title{font-size:22px;font-weight:500;margin-top:6px}
.clock{font-family:var(--mono);font-size:13px;color:var(--mu);margin-top:4px}
.steps{display:flex;align-items:center;justify-content:center;margin-bottom:24px}
.sn{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;border:1.5px solid var(--bd2);color:var(--mu);flex-shrink:0}
.sn.dn{background:rgba(74,222,128,.15);border-color:var(--g);color:var(--g)}
.sn.ac{background:var(--g2);border-color:var(--g2);color:#0d1a0f}
.sl{width:32px;height:1px;background:var(--bd2);margin:0 4px}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:20px;margin-bottom:14px}
.ct{font-size:14px;font-weight:500;margin-bottom:4px}
.cs{font-size:12px;color:var(--mu);margin-bottom:18px}
.tg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.tb{padding:20px 12px;border-radius:10px;border:1.5px solid var(--bd2);background:var(--s1);cursor:pointer;transition:all .15s;text-align:center;-webkit-tap-highlight-color:transparent}
.tb:active{transform:scale(.97)}
.tb.in-sel{border-color:var(--g);background:rgba(74,222,128,.08)}
.tb.out-sel{border-color:var(--w);background:rgba(251,191,36,.08)}
.tb.off{opacity:.35;cursor:not-allowed;pointer-events:none}
.ti{font-size:32px;margin-bottom:8px}
.tl{font-size:14px;font-weight:500}
.tt{font-size:11px;color:var(--mu);margin-top:3px;font-family:var(--mono)}
.pin-wrap{display:flex;gap:9px;justify-content:center;margin:14px 0}
.pin-box{width:54px;height:62px;background:var(--s2);border:1.5px solid var(--bd2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:26px;color:var(--g);transition:border-color .15s}
.pin-box.ac{border-color:var(--g)}.pin-box.fi{border-color:rgba(74,222,128,.4)}
.kp{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:230px;margin:0 auto}
.key{background:var(--s2);border:1px solid var(--bd2);border-radius:9px;padding:15px 10px;text-align:center;font-size:20px;cursor:pointer;font-family:var(--mono);transition:background .1s;user-select:none;-webkit-tap-highlight-color:transparent}
.key:active{background:var(--s1);transform:scale(.95)}
.key.dl{font-size:14px;color:var(--r)}
.key.ok{background:rgba(74,222,128,.1);border-color:rgba(74,222,128,.3);color:var(--g)}
.gps{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:8px;font-size:13px;margin-bottom:12px}
.gps.ok{background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);color:var(--g)}
.gps.err{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);color:var(--r)}
.gps.loading{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.2);color:var(--w)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;animation:pulse 1.4s ease-in-out infinite}
.dg{background:var(--g)}.dr{background:var(--r)}.dw{background:var(--w)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.fp-area{text-align:center;margin:16px 0}
.fp-btn{width:120px;height:120px;border-radius:50%;border:2px solid var(--bd2);background:var(--s2);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .25s;margin:0 auto;-webkit-tap-highlight-color:transparent}
.fp-btn:active{transform:scale(.95)}
.fp-btn.sc{border-color:var(--g);animation:scan 1s ease-in-out infinite}
.fp-btn.ok{border-color:var(--g);background:rgba(74,222,128,.15)}
@keyframes scan{0%,100%{box-shadow:0 0 0 6px rgba(74,222,128,.07)}50%{box-shadow:0 0 0 18px rgba(74,222,128,.03)}}
.fp-ic{font-size:48px}
.fp-lb{font-size:11px;color:var(--mu);margin-top:6px}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:12px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:'IBM Plex Sans',sans-serif;margin-top:10px;-webkit-tap-highlight-color:transparent}
.btn:active{transform:scale(.98)}
.bp{background:var(--g2);color:#0d1a0f}.bp:hover,.bp:active{background:var(--g)}
.bo{background:transparent;border:1px solid var(--bd2);color:#e8e6e0}
.btn:disabled{opacity:.4;cursor:not-allowed}
.alert{padding:11px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;line-height:1.5}
.al-e{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);color:var(--r)}
.al-s{background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);color:var(--g)}
.al-i{background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.2);color:var(--b)}
.al-w{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.2);color:var(--w)}
.done{text-align:center;padding:20px 0}
.done-ic{font-size:80px;margin-bottom:16px;animation:pop .4s ease-out}
@keyframes pop{0%{transform:scale(.3)}80%{transform:scale(1.1)}100%{transform:scale(1)}}
.done-h{font-size:20px;font-weight:500;color:var(--g);margin-bottom:10px}
.done-n{font-size:16px;color:var(--mu);margin-bottom:8px}
.done-t{font-family:var(--mono);font-size:36px;margin-bottom:4px}
.done-d{font-size:12px;color:var(--mu);margin-bottom:28px}
.mono{font-family:var(--mono)}
.setup{min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:32px 20px;width:100%}
.setup-card{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:28px;width:100%;max-width:420px}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.fl{font-size:11px;color:var(--mu)}
input{background:var(--s2);border:1px solid var(--bd2);border-radius:6px;padding:8px 11px;color:#e8e6e0;font-size:13px;font-family:'IBM Plex Sans',sans-serif;outline:none;transition:border-color .15s;width:100%}
input:focus{border-color:var(--g)}
input::placeholder{color:var(--mu)}
code{font-family:var(--mono);background:rgba(255,255,255,.08);padding:1px 5px;border-radius:3px;font-size:11px;color:#e8e6e0}
</style>
</head>
<body>

<div id="main-screen" style="display:none;width:100%">
<div class="wrap">
  <div class="hdr">
    <div class="logo">DAVOMAT TIZIMI</div>
    <div class="hdr-title">Xodim kirishi</div>
    <div class="clock" id="clock"></div>
  </div>
  <div id="root"></div>
</div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import {
  getFirestore, doc, getDoc, setDoc, updateDoc,
  collection, getDocs, query, where, serverTimestamp
} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

// ── Firebase config ──────────────────────────────────────────────────────────
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBj8NERdHAsxTJ7dl-xaIKwDQWFNgCl8bU",
  authDomain: "hodimlar-nazorati.firebaseapp.com",
  projectId: "hodimlar-nazorati",
  storageBucket: "hodimlar-nazorati.firebasestorage.app",
  messagingSenderId: "539426574914",
  appId: "1:539426574914:web:aef7f4787592bcece913db"
};

let db = null;

async function initFirebase() {
  try {
    const app = initializeApp(FIREBASE_CONFIG, 'davomat-emp');
    db = getFirestore(app);
    // Ulanishni tekshirish
    await getDoc(doc(db, 'config', 'app'));
    return true;
  } catch(e) {
    console.error('Firebase init xatosi:', e);
    db = null;
    return false;
  }
}

// ── Firestore helpers ────────────────────────────────────────────────────────

// FIX #1: Settings field nomlari admin.html bilan mos keltirildi
// admin.html: workStart, workEnd, leaveStart, leaveEnd, lat, lon, radius
// Eski kod arrivalStart, departureStart... ishlatgan — mos kelmagan!
async function loadSettings() {
  try {
    const snap = await getDoc(doc(db, 'config', 'app'));
    if (snap.exists()) {
      const d = snap.data();
      return {
        // admin.html da saqlanadigan field nomlar:
        arrivalStart:   d.workStart   || '08:00',
        arrivalEnd:     d.workEnd     || '09:00',
        departureStart: d.leaveStart  || '17:00',
        departureEnd:   d.leaveEnd    || '18:00',
        locationLat:    parseFloat(d.lat)    || 0,
        locationLng:    parseFloat(d.lon)    || 0,
        locationName:   d.locationName || 'Ish joyi',
        radius:         parseInt(d.radius)   || 50,
        // GPS yoqilganmi? lat/lon bo'lsa yoqilgan
        gpsEnabled:     !!(d.lat && d.lon),
      };
    }
  } catch(e) {
    console.warn('Settings yuklanmadi, default ishlatiladi:', e.message);
  }
  // Default — sozlamalar yo'q bo'lsa
  return {
    arrivalStart:'08:00', arrivalEnd:'09:00',
    departureStart:'17:00', departureEnd:'18:00',
    locationLat:0, locationLng:0, locationName:'Ish joyi',
    radius:50, gpsEnabled:false
  };
}

// FIX #2: Xodimlar admin.html "staff" collectionida, lekin bu kod "employees" dan o'qigan
async function loadEmployees() {
  // admin.html "staff" collectioniga yozadi, field nomi: pin
  const snap = await getDocs(collection(db, 'staff'));
  return snap.docs.map(d => ({ id: d.id, ...d.data() }));
}

// FIX #3: Attendance "attendance" collectionida, "records" emas
// admin.html: doc ID = staffId + '_' + date, fieldlar: kelish, ketish
async function loadTodayRecord(empId, date) {
  const docId = empId + '_' + date;
  const snap = await getDoc(doc(db, 'attendance', docId));
  if (snap.exists()) return { id: docId, ...snap.data() };
  return null;
}

async function saveRecord(empId, empName, empPos, date, type, time, lat, lon) {
  const docId = empId + '_' + date;
  const existing = await loadTodayRecord(empId, date);
  const base = existing || { staffId: empId, staffName: empName, staffPos: empPos || '', date };

  if (type === 'in') {
    base.kelish       = time;
    base.kelishAt     = new Date().toISOString();
    base.kelishStatus = state._kelishStatus || "O'z vaqtida";
    if (lat != null) { base.kelishLat = lat; base.kelishLon = lon; }
  } else {
    base.ketish       = time;
    base.ketishAt     = new Date().toISOString();
    base.ketishStatus = state._ketishStatus || "O'z vaqtida ketdi";
    if (lat != null) { base.ketishLat = lat; base.ketishLon = lon; }
  }
  base.updatedAt = serverTimestamp();

  await setDoc(doc(db, 'attendance', docId), base, { merge: true });
}

// ── State ────────────────────────────────────────────────────────────────────
let state = {
  step: 'type', type: null, pin: '',
  empId: null, empName: '', empPos: '',
  gpsStatus: 'idle', gpsMsg: '',
  gpsLat: null, gpsLon: null,
  fpState: 'idle',
  error: null, result: null,
  loading: false,
  _kelishStatus: "O'z vaqtida",
  _ketishStatus: "O'z vaqtida ketdi",
};

// ── Utils ────────────────────────────────────────────────────────────────────
function td() { return new Date().toISOString().split('T')[0]; }
function nowT() {
  const n = new Date();
  return String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
}
function tMin(t) {
  if (!t) return 0;
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}
function updateClock() {
  const el = document.getElementById('clock');
  if (el) el.textContent = nowT();
  setTimeout(updateClock, 10000);
}

// FIX #4: Kelish/ketish holati — admin.html bilan mos
function calcKelishStatus(settings) {
  const cur = new Date().getHours() * 60 + new Date().getMinutes();
  const limit = tMin(settings.arrivalStart);
  return cur <= limit ? "O'z vaqtida" : 'Kech';
}
function calcKetishStatus(settings) {
  const cur = new Date().getHours() * 60 + new Date().getMinutes();
  const limit = tMin(settings.departureStart);
  return cur < limit ? 'Erta ketdi' : "O'z vaqtida ketdi";
}

// ── Render ───────────────────────────────────────────────────────────────────
async function render() {
  let s;
  try {
    s = await loadSettings();
  } catch(e) {
    document.getElementById('root').innerHTML = `<div class="alert al-e">Firebase xatosi: ${e.message}</div>`;
    return;
  }

  const now = new Date();
  const cur = now.getHours() * 60 + now.getMinutes();

  // FIX #5: Vaqt oynasi KENG — test uchun: agar sozlanmagan bo'lsa HAMMA VAQT ishlaydi
  const hasArrival   = !!(s.arrivalStart && s.arrivalEnd);
  const hasDeparture = !!(s.departureStart && s.departureEnd);

  const inOk  = !hasArrival  || (cur >= tMin(s.arrivalStart)   && cur <= tMin(s.arrivalEnd));
  const outOk = !hasDeparture || (cur >= tMin(s.departureStart) && cur <= tMin(s.departureEnd));

  let steps = '';
  if (state.step !== 'type' && state.step !== 'done') {
    // GPS qadami: agar GPS yoqilmagan bo'lsa ko'rsatilmaydi
    const stepList = s.gpsEnabled ? ['Tur','Kod','GPS','Tasdiqlash'] : ['Tur','Kod','Tasdiqlash'];
    const stepKeys = s.gpsEnabled ? ['type','pin','gps','fp'] : ['type','pin','fp'];
    const idx = stepKeys.indexOf(state.step);
    steps = `<div class="steps">${stepList.map((n,i)=>`
      <div style="display:flex;align-items:center">
        <div class="sn ${i<idx?'dn':i===idx?'ac':''}">${i<idx?'✓':i+1}</div>
        ${i<stepList.length-1?'<div class="sl"></div>':''}
      </div>`).join('')}</div>`;
  }

  const err = state.error
    ? `<div class="alert al-e">${state.error} <span onclick="clearErr()" style="float:right;cursor:pointer">✕</span></div>`
    : '';
  let content = '';

  // ── STEP: type ───────────────────────────────────────────────────────────
  if (state.step === 'type') {
    content = `
      <div class="card">
        <div class="ct">Davomat turi</div>
        <div class="cs">Kelayapsizmi yoki ketayapsizmi?</div>
        <div class="tg">
          <div class="tb ${!inOk?'off':''}" onclick="selectType('in')">
            <div class="ti">🏢</div>
            <div class="tl">Kelish</div>
            <div class="tt">${hasArrival ? s.arrivalStart+'–'+s.arrivalEnd : 'Har doim'}</div>
          </div>
          <div class="tb ${!outOk?'off':''}" onclick="selectType('out')">
            <div class="ti">🏠</div>
            <div class="tl">Ketish</div>
            <div class="tt">${hasDeparture ? s.departureStart+'–'+s.departureEnd : 'Har doim'}</div>
          </div>
        </div>
        <div style="font-size:11px;color:var(--mu);text-align:center">
          ${s.gpsEnabled ? '📍 '+s.locationName+' · Radius: '+s.radius+'m' : '📍 GPS tekshiruvsiz rejim'}
        </div>
      </div>
    `;
  }

  // ── STEP: pin ────────────────────────────────────────────────────────────
  else if (state.step === 'pin') {
    content = `
      <div class="card">
        <div class="ct">${state.type==='in'?'🏢 Kelish':'🏠 Ketish'} — Kod kiriting</div>
        <div class="cs">Sizga berilgan 4 xonali PIN kodni kiriting</div>
        <div class="pin-wrap">
          ${Array.from({length:4}).map((_,i) => {
            const d = state.pin[i] || '';
            return `<div class="pin-box ${i===state.pin.length?'ac':''} ${d?'fi':''}">${d?'●':''}</div>`;
          }).join('')}
        </div>
        <div class="kp">
          ${['1','2','3','4','5','6','7','8','9','del','0','ok'].map(k=>`
            <div class="key ${k==='del'?'dl':''} ${k==='ok'?'ok':''}" onclick="pinKey('${k}')">${k==='del'?'⌫':k==='ok'?'✓':k}</div>
          `).join('')}
        </div>
      </div>
      <button class="btn bo" onclick="goBack()">← Orqaga</button>
    `;
  }

  // ── STEP: gps ────────────────────────────────────────────────────────────
  else if (state.step === 'gps') {
    const gClass   = state.gpsStatus==='ok'?'ok':state.gpsStatus==='err'?'err':'loading';
    const dotClass = state.gpsStatus==='ok'?'dg':state.gpsStatus==='err'?'dr':'dw';
    const gMsg     = state.gpsStatus==='loading' ? '📡 Joylashuv aniqlanmoqda...'
                   : state.gpsStatus==='ok'      ? state.gpsMsg
                   : state.gpsMsg || 'GPS xatosi';
    content = `
      <div class="card">
        <div class="ct">📍 GPS tekshiruvi</div>
        <div class="cs">${state.empName} — ${state.type==='in'?'Kelish':'Ketish'}</div>
        <div class="gps ${gClass}">
          <div class="dot ${dotClass}"></div>
          <span>${gMsg}</span>
        </div>
        ${state.gpsStatus==='ok' ? `<button class="btn bp" onclick="continueGps()">Davom etish →</button>` : ''}
        ${state.gpsStatus==='err' ? `<button class="btn bo" style="margin-top:8px" onclick="startGps()">🔄 Qayta urinish</button>` : ''}
      </div>
      <button class="btn bo" onclick="goBack()" ${state.gpsStatus==='loading'?'disabled':''}>← Orqaga</button>
    `;
  }

  // ── STEP: fp ─────────────────────────────────────────────────────────────
  else if (state.step === 'fp') {
    content = `
      <div class="card">
        <div class="ct">🔐 Tasdiqlash</div>
        <div class="cs">${state.empName}</div>
        <div class="fp-area">
          <div class="fp-btn ${state.fpState==='scanning'?'sc':state.fpState==='success'?'ok':''}" onclick="scanFp()">
            <div class="fp-ic">${state.fpState==='success'?'✅':'👆'}</div>
            <div class="fp-lb">${state.fpState==='success'?'Tasdiqlandi!':state.fpState==='scanning'?'Skanlanmoqda...':'Bosing'}</div>
          </div>
        </div>
      </div>
      <button class="btn bo" onclick="goBack()" ${state.fpState==='scanning'?'disabled':''}>← Orqaga</button>
    `;
  }

  // ── STEP: done ───────────────────────────────────────────────────────────
  else if (state.step === 'done' && state.result) {
    content = `
      <div class="done">
        <div class="done-ic">${state.result.type==='in'?'✅':'👋'}</div>
        <div class="done-h">${state.result.type==='in'?'Kelish qayd etildi!':'Ketish qayd etildi!'}</div>
        <div class="done-n">${state.result.empName}</div>
        <div class="done-t">${state.result.time}</div>
        <div class="done-d">${td()}</div>
        <div style="font-size:12px;color:var(--g);margin-bottom:20px;font-family:var(--mono)">🔥 Firebase ga saqlandi</div>
        <button class="btn bp" onclick="resetState()">Yangi amal</button>
      </div>
    `;
  }

  document.getElementById('root').innerHTML = steps + err + content;
}

// ── Actions ──────────────────────────────────────────────────────────────────
window.clearErr = function() { state.error = null; render(); };

window.goBack = function() {
  const order = ['type','pin','gps','fp'];
  const idx = order.indexOf(state.step);
  if (idx > 0) { state.step = order[idx-1]; state.error = null; render(); }
};

window.resetState = function() {
  state = {
    step:'type', type:null, pin:'',
    empId:null, empName:'', empPos:'',
    gpsStatus:'idle', gpsMsg:'',
    gpsLat:null, gpsLon:null,
    fpState:'idle', error:null, result:null, loading:false,
    _kelishStatus:"O'z vaqtida", _ketishStatus:"O'z vaqtida ketdi"
  };
  render();
};

// FIX #6: selectType — vaqt tekshiruvi to'g'irlandi
// Eski kod: buttons.off klassi bor bo'lsa ham onclick ishlardi!
// Endi .off klassi pointer-events:none bilan bloklanadi (CSS da ham to'g'irlandi)
window.selectType = async function(type) {
  const s = await loadSettings();
  const cur = new Date().getHours() * 60 + new Date().getMinutes();

  if (type === 'in' && s.arrivalStart && s.arrivalEnd) {
    if (cur < tMin(s.arrivalStart) || cur > tMin(s.arrivalEnd)) {
      state.error = `Kelish vaqti ${s.arrivalStart}–${s.arrivalEnd} orasida`;
      render(); return;
    }
  }
  if (type === 'out' && s.departureStart && s.departureEnd) {
    if (cur < tMin(s.departureStart) || cur > tMin(s.departureEnd)) {
      state.error = `Ketish vaqti ${s.departureStart}–${s.departureEnd} orasida`;
      render(); return;
    }
  }

  // Holat hisoblash
  state._kelishStatus = calcKelishStatus(s);
  state._ketishStatus = calcKetishStatus(s);
  state.type = type; state.step = 'pin'; state.error = null;
  render();
};

window.pinKey = function(k) {
  if (k === 'del') { state.pin = state.pin.slice(0,-1); render(); return; }
  if (k === 'ok')  { if (state.pin.length >= 4) submitPin(); return; }
  if (state.pin.length < 4) { state.pin += k; render(); if (state.pin.length === 4) setTimeout(submitPin, 150); }
};

async function submitPin() {
  if (state.loading) return;
  state.loading = true;

  try {
    const emps = await loadEmployees();
    if (!emps || emps.length === 0) {
      state.error = "Tizimda xodimlar yo'q. Admin panelida xodim qo'shing.";
      state.pin = ''; state.loading = false; render(); return;
    }

    // FIX #7: admin.html da field nomi "pin" (e.code emas, e.pin)
    const emp = emps.find(e => e.pin === state.pin);
    if (!emp) {
      state.error = "Noto'g'ri PIN. Qayta urinib ko'ring.";
      state.pin = ''; state.loading = false; render(); return;
    }

    const today = td();
    const existing = await loadTodayRecord(emp.id, today);

    // FIX #8: field nomlar admin bilan mos — kelish/ketish (checkIn/checkOut emas)
    if (state.type === 'in' && existing?.kelish) {
      state.error = `${emp.name} bugun allaqachon kelgan (${existing.kelish}).`;
      state.pin = ''; state.loading = false; render(); return;
    }
    if (state.type === 'out' && existing?.ketish) {
      state.error = `${emp.name} bugun allaqachon ketgan (${existing.ketish}).`;
      state.pin = ''; state.loading = false; render(); return;
    }
    if (state.type === 'out' && !existing?.kelish) {
      state.error = 'Avval kelish qayd etilmagan.';
      state.pin = ''; state.loading = false; render(); return;
    }

    state.empId   = emp.id;
    state.empName = emp.name;
    state.empPos  = emp.position || '';
    state.loading = false;

    const s = await loadSettings();
    if (s.gpsEnabled) {
      // GPS yoqilgan — GPS qadamiga o'tish
      state.step = 'gps'; state.error = null;
      render();
      startGps();
    } else {
      // GPS yo'q — to'g'ridan-to'g'ri tasdiqlashga o'tish
      state.step = 'fp'; state.error = null;
      render();
    }

  } catch(e) {
    state.error = 'Firebase xatosi: ' + e.message;
    state.pin = ''; state.loading = false; render();
  }
}

window.startGps = function() {
  state.gpsStatus = 'loading'; state.gpsMsg = ''; render();
  if (!navigator.geolocation) {
    state.gpsStatus = 'err'; state.gpsMsg = "Qurilmangiz GPS ni qo'llamaydi"; render(); return;
  }
  navigator.geolocation.getCurrentPosition(
    async pos => {
      const s = await loadSettings();
      const R=6371000,
        dLat=(pos.coords.latitude - s.locationLat)*Math.PI/180,
        dLon=(pos.coords.longitude - s.locationLng)*Math.PI/180;
      const a = Math.sin(dLat/2)**2 + Math.cos(s.locationLat*Math.PI/180)*Math.cos(pos.coords.latitude*Math.PI/180)*Math.sin(dLon/2)**2;
      const dist = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      state.gpsLat = pos.coords.latitude;
      state.gpsLon = pos.coords.longitude;
      if (dist <= s.radius) {
        state.gpsStatus = 'ok';
        state.gpsMsg = `✓ Hududda (${Math.round(dist)}m, ruxsat: ${s.radius}m)`;
      } else {
        state.gpsStatus = 'err';
        state.gpsMsg = `Hududdan ${Math.round(dist - s.radius)}m tashqaridasiz`;
      }
      render();
    },
    err => {
      state.gpsStatus = 'err';
      state.gpsMsg = err.code===1
        ? 'Joylashuvga ruxsat berilmagan (sozlamalarda yoqing)'
        : 'GPS signali topilmadi';
      render();
    },
    {enableHighAccuracy:true, timeout:10000, maximumAge:0}
  );
};

window.continueGps = function() {
  if (state.gpsStatus !== 'ok') return;
  state.step = 'fp'; render();
};

window.scanFp = function() {
  if (state.fpState !== 'idle') return;
  state.fpState = 'scanning'; render();
  async function tryWebAuthn() {
    try {
      if (window.PublicKeyCredential) {
        const avail = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
        if (avail) {
          await navigator.credentials.get({
            publicKey:{
              challenge: crypto.getRandomValues(new Uint8Array(32)),
              timeout: 60000,
              userVerification: 'required'
            }
          });
        }
      }
    } catch(e) {
      // WebAuthn muvaffaqiyatsiz bo'lsa ham davom etamiz (ixtiyoriy)
    }
    finalizeAttendance();
  }
  setTimeout(tryWebAuthn, 1200);
};

async function finalizeAttendance() {
  const time  = nowT();
  const today = td();
  try {
    await saveRecord(
      state.empId, state.empName, state.empPos,
      today, state.type, time,
      state.gpsLat, state.gpsLon
    );
    state.fpState = 'success';
    state.result  = { type: state.type, empName: state.empName, time };
    render();
    setTimeout(() => { state.step = 'done'; render(); }, 600);
  } catch(e) {
    state.fpState = 'idle';
    state.error   = 'Saqlashda xato: ' + e.message;
    render();
  }
}

// ── Init ─────────────────────────────────────────────────────────────────────
(async function init() {
  const ok = await initFirebase();
  if (!ok) {
    document.body.innerHTML = `
      <div style="padding:32px;max-width:400px;margin:auto;text-align:center">
        <div style="font-size:40px;margin-bottom:16px">🔥</div>
        <div style="color:#f87171;font-family:IBM Plex Mono,monospace;font-size:13px;margin-bottom:8px">FIREBASE ULANMADI</div>
        <div style="color:#8a8a8a;font-size:12px;line-height:1.7">Firebase config yoki internet ulanishini tekshiring.</div>
      </div>`;
    return;
  }
  document.getElementById('main-screen').style.display = 'block';
  updateClock();
  render();
})();
</script>
